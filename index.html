<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mini Tower Defense</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Mini Tower Defense</h1>
      <div class="controls">
        <button id="pauseBtn">Pause</button>
        <button id="speedBtn">1x</button>
      </div>
    </header>

    <canvas id="gameCanvas" width="420" height="740" aria-label="tower defense game canvas"></canvas>

    <section id="hud">
      <div>Lives: <span id="lives">20</span></div>
      <div>Cash: <span id="cash">999</span></div>
      <div>Wave: <span id="wave">1</span></div>
    </section>

    <section id="towerPanel">
      <h2>Base Tower Upgrades</h2>
      <div id="tiers">Path A: <span id="p0">0</span> | Path B: <span id="p1">0</span> | Path C: <span id="p2">0</span></div>
      <div class="upgradeRow">
        <button data-path="0" id="up0">Upgrade Path A</button>
        <button data-path="1" id="up1">Upgrade Path B</button>
        <button data-path="2" id="up2">Upgrade Path C</button>
      </div>
      <p class="hint">Rules: only 2 paths can be chosen; only 1 chosen path can pass tier 2 and reach tier 5.</p>
    </section>
  </div>

  <div id="pauseMenu" class="hidden">
    <div class="modal">
      <h2>Paused</h2>
      <button id="resumeBtn">Resume</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
