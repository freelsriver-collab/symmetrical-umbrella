<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Tower Defense</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Mini Tower Defense</h1>
      <div class="controls">
        <button id="startBtn">Start Game</button>
        <button id="pauseBtn">Pause</button>
        <button id="speedBtn">1x</button>
      </div>
    </header>

    <main class="layout">
      <canvas id="gameCanvas" width="1120" height="700" aria-label="tower defense game canvas"></canvas>

      <aside class="sidebar">
        <section id="hud">
          <div>Lives: <span id="lives">20</span></div>
          <div>Cash: <span id="cash">500</span></div>
          <div>Wave: <span id="wave">0</span>/<span id="maxWave">5</span></div>
          <div>Status: <span id="status">Ready</span></div>
        </section>

        <section id="towerShop">
          <h2>Towers</h2>
          <button id="placeTowerBtn">Place Basic Tower (100g)</button>
          <p class="hint">Tap/click the map (not on the road) to place.</p>
        </section>

        <section id="towerPanel">
          <h2>Selected Tower Upgrades</h2>
          <div id="selectedLabel">No tower selected</div>
          <div id="tiers">Path A: <span id="p0">0</span> | Path B: <span id="p1">0</span> | Path C: <span id="p2">0</span></div>
          <div class="upgradeRow">
            <button data-path="0" id="up0">Upgrade Path A</button>
            <button data-path="1" id="up1">Upgrade Path B</button>
            <button data-path="2" id="up2">Upgrade Path C</button>
          </div>
          <p class="hint">Rules: only 2 paths can be chosen; only 1 chosen path can pass tier 2 and reach tier 5.</p>
        </section>
      </aside>
    </main>
  </div>

  <div id="pauseMenu" class="hidden">
    <div class="modal">
      <h2>Paused</h2>
      <button id="resumeBtn">Resume</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
